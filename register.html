<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <header class="header d-flex w-100 justify-content-between px-3 px-md-5 py-4 align-items-center z-1 bg-white">
        <div>
            <a href="#">
                <img src="./img/NM-Logo.png" class="logo" alt />
            </a>
        </div>
        <nav class="d-md-block d-none">
            <ul class="d-flex p-0 m-0 gap-4">
                <li>
                    <a class="text-decoration-none text-black fw-medium" href="/index.html#about">ABOUT APPLICATION</a>
                </li>
                <li><a class="text-decoration-none text-black fw-medium" href="/index.html#benefits">BENEFITS</a></li>
                <li><a class="text-decoration-none text-black fw-medium" href="/index.html#case">CASE</a></li>
                <li>
                    <a class="text-decoration-none text-black fw-medium" href="/register.html">CONTACT</a>
                </li>
            </ul>
        </nav>
        <label class="burger d-md-none d-block" for="burger">
            <input type="checkbox" id="burger">
            <span></span>
            <span></span>
            <span></span>
            <nav class="nav-menu ">
                <ul class="p-3 pb-3 m-0 d-flex flex-column gap-3">
                    <li><a href="/index.html#about">ABOUT APPLICATION</a></li>
                    <li><a href="/index.html#benefits">BENEFITS</a></li>
                    <li><a href="/index.html#case">CASE</a></li>
                    <li><a href="/register.html">CONTACT</a></li>
                </ul>
            </nav>
        </label>
    </header>
    <main>
        <section class="register-page">
            <div class="register-page__illustration d-md-grid d-none align-items-center justify-content-center">
                <div class="d-flex flex-column gap-5 align-items-center px-3">
                <h1 class="text-white text-center">Get Connected With Your Town Today!</h1>
                <img class="register-page__image" src="./img/register-page-illustration.png" alt></div>
            </div>
            <div class="register-page__inner" data-aos="fade-up">
                <div class="register-page__form">
                    <div class="register-page__title">
                        <p>Inquiry</p>
                    </div>
                    <form action="#">
                        <div class="register-page__user__details">
                            <div class="register-page__input__box">
                                <label for="full__name">Full Name</label>
                                <input type="text" id="full__name" placeholder="Enter your full name" required>
                            </div>
                            <div class="register-page__input__box">
                                <label for="email">Email</label>
                                <input type="email" id="email" placeholder="Enter your email" required>
                            </div>
                            <div class="register-page__input__box">
                                <label for="phone__number">Phone Number</label>
                                <input type="tel" id="phone__number" placeholder="Enter your phone number" required>
                            </div>
                            <div class="register-page__input__box">
                                <label for="company__name">Company Name</label>
                                <input type="text" id="company__name" placeholder="Enter your company name" required>
                            </div>
                            <div class="register-page__input__box">
                                <label for="inquiry__contents">Inquiry contents</label>
                                <textarea type="number" id="inquiry__contents"
                                    placeholder="What type of website are you interested in building?"
                                    required></textarea>
                            </div>
                            <div class="d-flex gap-2 align-items-center"><input type="checkbox" name="register"
                                    id="register-page__term" class="register-page__term"><label
                                    for="register-page__term">I agree to the terms and
                                    <a href="">conditions,
                                        privacy policy, and cookie policy</a></label></div>
                            <div class="register-page__reg__btn">
                                <input type="submit" value="SEND">
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer >
        <div class="footer__inner">
            <p>© 2024 NEXT MAKE All Rights Reserved.</p>
        </div>
    </footer>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
